<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Juegos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .header p {
            color: #a0a0a0;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: #a0a0a0;
            font-size: 1em;
        }

        .tab.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* Chat Styles */
        .chat-container {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .chat-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h2 {
            font-size: 1.2em;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance {
            background: linear-gradient(135deg, #28a745, #20c997);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(233, 69, 96, 0.5);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .chat-input-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1em;
        }

        .chat-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        /* Menu Buttons */
        .menu-buttons {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
        }

        .menu-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .menu-btn:hover, .menu-btn.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
        }

        /* Quick Messages */
        .quick-messages {
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.1);
        }

        .quick-msg {
            padding: 8px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: transparent;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .quick-msg:hover {
            border-color: #e94560;
            color: #e94560;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: rgba(233, 69, 96, 0.9);
        }

        .toast.success {
            background: rgba(40, 167, 69, 0.9);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .auth-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="container">
        <div class="header">
            <h1>🎮 Sala de Juegos</h1>
            <p>¡Bienvenido! Inicia sesión para comenzar</p>
        </div>

        <div class="auth-container">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab" onclick="switchTab('register')">Registrarse</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Usuario</label>
                    <input type="text" id="loginUsername" required placeholder="Ingresa tu usuario">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="Ingresa tu contraseña">
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regUsername">Usuario</label>
                    <input type="text" id="regUsername" required placeholder="Elige un usuario">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="regPhone">Teléfono</label>
                    <input type="tel" id="regPhone" required placeholder="+54 9 11 1234-5678">
                </div>
                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" required placeholder="Crea una contraseña">
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>

            <div class="loading" id="authLoading">
                <div class="spinner"></div>
                <p>Cargando...</p>
            </div>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container">
        <div class="chat-header">
            <h2>💬 Chat de Soporte</h2>
            <div class="user-info">
                <span class="balance" id="userBalance">$0</span>
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">Salir</button>
            </div>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn active" onclick="switchMenu('chat')">💬 Chat</button>
            <button class="menu-btn" onclick="switchMenu('deposit')">💰 Depósito</button>
            <button class="menu-btn" onclick="switchMenu('withdraw')">💸 Retiro</button>
            <button class="menu-btn" onclick="switchMenu('games')">🎮 Juegos</button>
        </div>

        <div class="quick-messages">
            <button class="quick-msg" onclick="sendQuickMessage('Hola, necesito ayuda')">Necesito ayuda</button>
            <button class="quick-msg" onclick="sendQuickMessage('Quiero hacer un depósito')">Depósito</button>
            <button class="quick-msg" onclick="sendQuickMessage('Quiero retirar')">Retiro</button>
            <button class="quick-msg" onclick="sendQuickMessage('Tengo un problema')">Problema</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be loaded here -->
        </div>

        <div class="chat-input-container">
            <input type="text" class="chat-input" id="messageInput" placeholder="Escribe un mensaje..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // API URL - Cambia esto por tu URL de Vercel
        const API_URL = window.location.origin;
        
        // User state
        let currentUser = null;
        let authToken = null;
        let messages = [];
        let lastMessageCount = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check for saved session
            const savedToken = localStorage.getItem('authToken');
            const savedUser = localStorage.getItem('currentUser');
            
            if (savedToken && savedUser) {
                authToken = savedToken;
                currentUser = JSON.parse(savedUser);
                showChat();
                loadMessages();
                startMessagePolling();
            }
        });

        // Tab switching
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        // Show toast
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Loading state
        function setLoading(loading) {
            document.getElementById('authLoading').classList.toggle('active', loading);
        }

        // Handle login
        async function handleLogin(e) {
            e.preventDefault();
            setLoading(true);

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showToast('¡Bienvenido!', 'success');
                    showChat();
                    loadMessages();
                    startMessagePolling();
                } else {
                    showToast(data.error || 'Error al iniciar sesión', 'error');
                }
            } catch (error) {
                showToast('Error de conexión', 'error');
            } finally {
                setLoading(false);
            }
        }

        // Handle register
        async function handleRegister(e) {
            e.preventDefault();
            setLoading(true);

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('¡Registro exitoso! Ahora inicia sesión', 'success');
                    switchTab('login');
                    document.querySelector('.tab').click();
                } else {
                    showToast(data.error || 'Error al registrarse', 'error');
                }
            } catch (error) {
                showToast('Error de conexión', 'error');
            } finally {
                setLoading(false);
            }
        }

        // Show chat
        function showChat() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userBalance').textContent = `$${currentUser.balance || 0}`;
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            authToken = null;
            currentUser = null;
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('chatContainer').style.display = 'none';
            stopMessagePolling();
        }

        // Load messages
        async function loadMessages() {
            if (!currentUser) return;

            try {
                const response = await fetch(`${API_URL}/api/messages/${currentUser.id}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    messages = await response.json();
                    renderMessages();
                    
                    // Mark messages as read
                    if (messages.length > lastMessageCount) {
                        fetch(`${API_URL}/api/messages/read/${currentUser.id}`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${authToken}` }
                        });
                    }
                    lastMessageCount = messages.length;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Render messages
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            messages.forEach(msg => {
                const isSent = msg.senderId === currentUser.id;
                const messageEl = document.createElement('div');
                messageEl.className = `message ${isSent ? 'sent' : 'received'}`;
                
                const time = new Date(msg.timestamp).toLocaleTimeString('es-AR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                messageEl.innerHTML = `
                    <div>${escapeHtml(msg.content)}</div>
                    <div class="message-time">${time}</div>
                `;
                
                container.appendChild(messageEl);
            });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentUser) return;

            try {
                const response = await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content })
                });

                if (response.ok) {
                    input.value = '';
                    loadMessages();
                } else {
                    showToast('Error al enviar mensaje', 'error');
                }
            } catch (error) {
                showToast('Error de conexión', 'error');
            }
        }

        // Send quick message
        function sendQuickMessage(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        // Handle key press
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Message polling
        let pollInterval = null;

        function startMessagePolling() {
            loadMessages();
            pollInterval = setInterval(loadMessages, 3000);
        }

        function stopMessagePolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // Menu switching
        function switchMenu(menu) {
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (menu === 'deposit') {
                sendQuickMessage('Quiero hacer un depósito');
            } else if (menu === 'withdraw') {
                sendQuickMessage('Quiero retirar');
            } else if (menu === 'games') {
                sendQuickMessage('Quiero jugar');
            }
        }
    </script>
</body>
</html>
